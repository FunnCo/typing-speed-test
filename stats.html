<!DOCTYPE html>
<html lang="ru" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="index,follow">
    <link rel="canonical" href="https://funnco.github.io/typing-speed-test/stats.html">
    <meta name="description" content="Статистика тренировок печати: графики WPM, точности, фильтры по режимам и языку.">

    <meta property="og:title" content="Статистика — FunTypeTest">
    <meta property="og:description" content="Статистика тренировок печати: графики WPM, точности, фильтры по режимам и языку.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://funnco.github.io/typing-speed-test/stats.html">

    <title>Статистика — FunTypeTest</title>

    <link rel="icon" href="favicon.ico">
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="container py-4 box">
      <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h1 class="yellow h3 m-0">Статистика тренировок</h1>
        <div class="d-flex gap-2 flex-wrap">
          <a href="index.html" class="btn btn-sm btn-outline-warning btn-yellow">Назад к тесту</a>
          <a href="glossary.html" class="btn btn-sm btn-outline-warning btn-yellow">Справка</a>
          <button id="exportBtn" class="btn btn-sm btn-outline-warning btn-yellow">Экспорт</button>
          <button id="importBtn" class="btn btn-sm btn-outline-warning btn-yellow">Импорт</button>
          <button id="clearStatsBtn" class="btn btn-sm btn-outline-danger">Очистить статистику</button>
        </div>
      </div>

      <!-- Фильтры -->
      <div class="card mb-3 dark-card">
        <div class="card-body">
          <div class="row g-2 align-items-end">
            <div class="col-12 col-md-4">
              <label class="form-label text-light">Язык</label>
              <select id="filterLanguage" class="form-select form-select-sm dark-select">
                <option value="all" selected>Все</option>
                <option value="ru">RU</option>
                <option value="en">EN</option>
              </select>
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label text-light">Сложность</label>
              <select id="filterDifficulty" class="form-select form-select-sm dark-select">
                <option value="all" selected>Все</option>
                <option value="beginner">база</option>
                <option value="pro">про</option>
              </select>
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label text-light">Лимит времени</label>
              <select id="filterDuration" class="form-select form-select-sm dark-select">
                <option value="all" selected>Все</option>
                <option value="30">30 сек</option>
                <option value="60">60 сек</option>
              </select>
            </div>
            <div class="col-12 col-md-4 d-flex gap-2 align-items-center">
              <div class="form-check mt-3 mt-md-0">
                <input class="form-check-input" type="checkbox" id="toggleMA" checked>
                <label class="form-check-label text-light" for="toggleMA">Сглаживание (MA)</label>
              </div>
              <button id="resetFiltersBtn" class="btn btn-sm btn-outline-warning ms-auto btn-yellow">Сбросить</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Агрегаты -->
      <div class="card mb-4 dark-card">
        <div class="card-body">
          <h2 class="card-title h5 yellow">Сводка</h2>
          <div id="summary" class="summary-grid">
            <!-- заполняется скриптом -->
          </div>
        </div>
      </div>

      <div class="card mb-4 dark-card">
        <div class="card-body">
          <h2 class="card-title h5 yellow">График динамики</h2>
          <canvas id="statsChart" height="120"></canvas>
        </div>
      </div>

      <div class="card dark-card">
        <div class="card-body">
          <h2 class="card-title h5 yellow">Список попыток</h2>
          <div id="attemptsList" class="list-group">
            <!-- заполняется скриптом -->
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="dataModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content dark-card">
          <div class="modal-header">
            <h2 class="modal-title yellow h5" id="dataModalTitle">Данные</h2>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Закрыть"></button>
          </div>
          <div class="modal-body">
            <textarea id="dataTextarea" class="form-control dark-select" rows="10" spellcheck="false"></textarea>
            <div class="small text-muted mt-2 basic-text" id="dataHint"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-warning btn-yellow" id="copyBtn">Копировать</button>
            <button type="button" class="btn btn-outline-warning btn-yellow" id="applyBtn">Применить импорт</button>
          </div>
        </div>
      </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="stats.js"></script>

    
  </body>
</html>
