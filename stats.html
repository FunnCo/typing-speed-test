<!DOCTYPE html>
<html lang="ru" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Статистика — Typing Test</title>

    <link rel="icon" href="favicon.ico">
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Ваши стили -->
    <link rel="stylesheet" href="styles.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="yellow h3 m-0">Статистика тренировок</h1>
        <div class="d-flex gap-2">
          <a href="index.html" class="btn btn-sm btn-outline-warning">Назад к тесту</a>
          <a href="glossary.html" class="btn btn-sm btn-outline-warning">Справка</a>
          <button id="clearStatsBtn" class="btn btn-sm btn-outline-danger">Очистить статистику</button>
        </div>
      </div>

      <div class="card mb-4" style="background:#2a2a2a; border-color:#52575d;">
        <div class="card-body">
          <h5 class="card-title yellow">График динамики</h5>
          <canvas id="statsChart" height="120"></canvas>
          <small class="text-muted d-block mt-2">Показаны WPM и точность (%) по мере выполнения попыток.</small>
        </div>
      </div>

      <div class="card" style="background:#2a2a2a; border-color:#52575d;">
        <div class="card-body">
          <h5 class="card-title yellow">Список попыток</h5>
          <div id="attemptsList" class="list-group">
            <!-- Список будет заполнен скриптом -->
          </div>
        </div>
      </div>
    </div>

    <!-- Скрипт страницы статистики -->
    <script src="stats.js"></script>
    <!-- Bootstrap bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
